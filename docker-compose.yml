# docker-compose for Pontoon development.
#
# Note: Requires docker-compose 1.27+.
services:
  server:
    image: 715161504141.dkr.ecr.eu-west-1.amazonaws.com/pontoon:1.1.11
    env_file:
      - .env
    ports:
      - '8000:8000'
    volumes:
      - ./pontoon:/app/pontoon
      - ./requirements:/app/requirements
      - ./translate:/app/translate
      - ~/.ssh:/home/pontoon/.ssh

# Persist database
volumes:
  pgdata: null
